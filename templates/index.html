<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProFace WebApp</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>ProFace WebApp</h1>
      <p>Uploade genau 5 Fotos, wähle ein Template und starte die Replicate-Nano-Banana Pipeline.</p>

      <form id="gen-form">
        <label for="style">Template</label>
        <select id="style" name="style">
          {% for t in templates %}
          <option value="{{ t }}">{{ t }}</option>
          {% endfor %}
        </select>

        <label for="photos">Fotos (genau {{ max_uploads }})</label>
        <input id="photos" name="photos" type="file" accept="image/*" multiple required />

        <button type="submit">Generieren</button>
      </form>

      <section>
        <h2>Status</h2>
        <pre id="status">Bereit.</pre>
      </section>

      <section>
        <h2>Vorschauen</h2>
        <div id="previews" class="grid"></div>
      </section>

      <section>
        <h2>Final</h2>
        <div id="final"></div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
  </html>
