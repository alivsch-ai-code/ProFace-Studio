[phases.setup]
nixPkgs = ["nodejs", "python312", "gcc"]

[phases.install]
cmds = [
  "npm ci --prefix webapp-react",
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "npm run build --prefix webapp-react"
]

[start]
cmd = "/opt/venv/bin/python web_app.py"
